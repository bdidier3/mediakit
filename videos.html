<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vidéos parc | Clip2ep</title>
  <link rel="icon" type="image/x-icon" href="img/ico/clip2ep.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --yellow: #7dd3fc;
      --text: #111;
      --muted: #4c4c4c;
      --line: #c5e5f6;
      --bg: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Plus Jakarta Sans", Arial, sans-serif;
      background:
        radial-gradient(circle at 6% -8%, rgba(125, 211, 252, 0.3), transparent 42%),
        linear-gradient(180deg, #ffffff, #f3faff 34%, #eff8ff 100%);
      color: var(--text);
      padding: 102px 18px 50px;
    }
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 50;
      background: var(--yellow);
      color: #111;
    }
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 26px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      position: relative;
    }
    .nav-links {
      display: flex;
      gap: 40px;
      font-family: "Plus Jakarta Sans", sans-serif;
      font-weight: 800;
      text-transform: uppercase;
      font-size: 1rem;
    }
    .nav-toggle {
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: transparent;
      border-radius: 10px;
      width: 42px;
      height: 42px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
    }
    .nav-toggle-line {
      width: 18px;
      height: 2px;
      border-radius: 99px;
      background: #ffffff;
    }
    .nav-links a {
      position: relative;
      padding-bottom: 6px;
      color: #ffffff;
      text-decoration: none;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 2px;
      background: #ffffff;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.2s ease;
    }

    .nav-links a:hover::after,
    .nav-links a.active::after {
      transform: scaleX(1);
    }
    .lang-switcher {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
    }
    .lang-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0;
      border: 1px solid rgba(0, 0, 0, 0.16);
      border-radius: 999px;
      background: #ffffff;
      color: #111;
      font-weight: 800;
      font-size: 1.05rem;
      padding: 8px 10px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
    }
    .lang-toggle:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
      background: #ffffff;
    }
    .lang-toggle[aria-expanded="true"] {
      box-shadow: 0 0 0 3px rgba(255, 212, 0, 0.55);
    }
    .lang-flag {
      line-height: 1;
    }
    .flag-icon {
      display: inline-block;
      width: 1.3em;
      height: 0.92em;
      border-radius: 3px;
      border: 1px solid rgba(0, 0, 0, 0.2);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.25);
      overflow: hidden;
      vertical-align: middle;
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
    }
    .flag-fr {
      background-image: url('img/flags/fr.svg');
    }
    .flag-es {
      background-image: url('img/flags/es.svg');
    }
    .flag-de {
      background-image: url('img/flags/de.svg');
    }
    .flag-nl {
      background-image: url('img/flags/nl.svg');
    }
    .flag-en {
      background-image: url('img/flags/gb.svg');
    }
    .lang-caret {
      font-size: 0.68rem;
      opacity: 0.75;
      margin-left: 6px;
    }
    .lang-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      list-style: none;
      margin: 0;
      padding: 6px;
      width: 180px;
      border-radius: 14px;
      border: 1px solid rgba(0, 0, 0, 0.14);
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 28px rgba(0, 0, 0, 0.16);
      display: none;
      z-index: 50;
    }
    .lang-menu.open {
      display: block;
    }
    .lang-option {
      width: 100%;
      border: 0;
      background: transparent;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 0.86rem;
      cursor: pointer;
      font-family: "Plus Jakarta Sans", Arial, sans-serif;
    }
    .lang-option:hover,
    .lang-option.active {
      background: linear-gradient(90deg, #fff4bf, #ffec88);
    }
    .lang-option .left {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .lang-option .left span:first-child {
      width: 1.35em;
      height: 0.95em;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      position: sticky;
      top: 84px;
      z-index: 40;
      background: transparent;
      backdrop-filter: none;
      padding: 8px 0;
    }
    .view-filter {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .view-chip {
      border: 1px solid rgba(15, 71, 119, 0.22);
      background: #ffffff;
      color: #111;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      font-size: 0.84rem;
      font-weight: 700;
      font-family: "Plus Jakarta Sans", Arial, sans-serif;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }
    .chip-icon {
      width: 14px;
      height: 14px;
      flex: 0 0 auto;
    }
    .view-chip:hover {
      background: #eef8ff;
      border-color: rgba(15, 71, 119, 0.38);
    }
    .view-chip.active {
      background: #0f4777;
      color: #ffffff;
      border-color: #0f4777;
    }
    .back {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      text-decoration: none;
      color: #111;
      font-weight: 700;
      background: #fff;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      transition: none;
    }
    .back:hover,
    .back:active,
    .back:focus,
    .back:focus-visible {
      color: #111;
      background: #fff;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      outline: none;
    }
    h1 {
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      margin-bottom: 8px;
    }
    .lead {
      color: var(--muted);
      margin-bottom: 22px;
    }
    .park-overview {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 360px);
      gap: 22px;
      align-items: start;
      margin-bottom: 16px;
    }
    .park-title-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      min-width: 0;
    }
    .park-logo {
      width: 164px;
      height: 164px;
      object-fit: contain;
      border-radius: 22px;
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.08);
      padding: 14px;
      box-shadow: 0 16px 34px rgba(17, 58, 92, 0.16);
      flex: 0 0 auto;
    }
    .stats-title {
      font-size: 1.06rem;
      font-weight: 800;
      color: #0f4777;
      margin: 4px 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .park-map-card {
      border: 1px solid rgba(74, 151, 203, 0.2);
      border-radius: 18px;
      background: #ffffff;
      padding: 10px;
      box-shadow: 0 16px 34px rgba(17, 58, 92, 0.16);
      position: relative;
      overflow: hidden;
    }
    #park-map {
      width: 100%;
      height: 210px;
      border: 0;
      border-radius: 12px;
      display: block;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }
    .stat {
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 14px;
      padding: 14px;
      background: linear-gradient(165deg, #ffffff, #f0f8ff);
      box-shadow: 0 10px 22px rgba(18, 58, 92, 0.08);
    }
    .stat strong {
      display: block;
      font-size: 1.35rem;
      margin-bottom: 2px;
    }
    .stat-top {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }
    .stat-icon {
      width: 18px;
      height: 18px;
      color: #111;
      flex: 0 0 auto;
    }
    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .platform {
      border-top: 2px solid rgba(0, 0, 0, 0.1);
      padding-top: 18px;
      margin-top: 18px;
    }
    .platform h2 {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 1.35rem;
      margin-bottom: 10px;
    }
    .platform-icon {
      width: 18px;
      height: 18px;
      display: inline-block;
      color: #111;
      flex: 0 0 auto;
    }
    ul {
      list-style: none;
      display: grid;
      gap: 10px;
    }
    li {
      border: 1px solid rgba(74, 151, 203, 0.2);
      border-radius: 14px;
      padding: 14px;
      background: #fff;
      box-shadow: 0 10px 22px rgba(17, 58, 92, 0.08);
    }
    .video-row {
      display: grid;
      grid-template-columns: 108px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }
    .video-thumb {
      width: 108px;
      aspect-ratio: 9 / 16;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: linear-gradient(135deg, #dbefff, #f3f9ff);
      box-shadow: 0 8px 18px rgba(17, 58, 92, 0.14);
      display: block;
    }
    .video-thumb.is-placeholder {
      object-fit: contain;
      padding: 10px;
    }
    .video-content {
      min-width: 0;
    }
    .title {
      font-weight: 700;
      margin-bottom: 6px;
    }
    .meta {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .hashtags {
      font-size: 0.86rem;
      color: #222;
      font-weight: 500;
      margin-bottom: 8px;
      line-height: 1.4;
      word-break: break-word;
    }
    .link {
      color: #0f4777;
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 3px;
      word-break: break-all;
    }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 16px;
      color: var(--muted);
      background: #fff;
    }
    .list-sentinel {
      width: 100%;
      height: 1px;
      opacity: 0;
    }
    @media (max-width: 1024px) {
      .nav-links {
        gap: 24px;
        font-size: 0.9rem;
      }
    }
    @media (max-width: 760px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .nav-inner {
        justify-content: center;
        padding: 16px 12px;
        min-height: 64px;
      }
      .nav-toggle {
        display: inline-flex;
        position: absolute;
        left: 8px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 56;
      }
      .nav-links {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        flex-direction: column;
        gap: 0;
        font-size: 0.86rem;
        background: var(--yellow);
        border-top: 1px solid rgba(255, 255, 255, 0.4);
        border-bottom: 1px solid rgba(255, 255, 255, 0.42);
        border-radius: 0 0 16px 16px;
        padding: 6px;
        box-shadow: 0 14px 24px rgba(18, 74, 113, 0.3);
        backdrop-filter: blur(8px);
      }
      .nav-links.open { display: flex; }
      .nav-links a {
        padding: 10px 12px;
        border-radius: 10px;
        color: #ffffff;
      }
      .nav-links a:hover {
        background: rgba(255, 255, 255, 0.16);
      }
      .nav-links a:hover::after,
      .nav-links a.active::after {
        display: none;
      }
      .lang-switcher { right: 8px; }
      .lang-toggle {
        padding: 6px 8px;
        font-size: 0.95rem;
      }
      .lang-menu { width: 160px; }
      .top {
        flex-direction: column;
        align-items: flex-start;
        top: 66px;
      }
      .park-overview {
        grid-template-columns: 1fr;
      }
      .park-map-card {
        max-width: 100%;
      }
      #park-map {
        height: 190px;
      }
      body {
        padding: 96px 12px 32px;
      }
    }
    @media (max-width: 560px) {
      h1 {
        font-size: clamp(1.45rem, 8vw, 2rem);
      }
      .lead {
        font-size: 0.94rem;
      }
      .stats {
        grid-template-columns: 1fr;
      }
      .meta {
        font-size: 0.84rem;
      }
      .video-row {
        grid-template-columns: 1fr;
      }
      .video-thumb {
        width: min(52vw, 190px);
        aspect-ratio: 9 / 16;
      }
    }
  </style>
</head>

      const flag = document.getElementById('lang-flag');

      document.querySelectorAll('.lang-option').forEach((option) => {

    function applyUiLanguage(lang) {
      const selected = uiTranslations[lang] ? lang : 'fr';
      const dict = uiTranslations[selected];

      document.documentElement.lang = selected;

      document.querySelectorAll('[data-i18n]').forEach((node) => {
        const key = node.getAttribute('data-i18n');
        const text = getValueByPath(dict, key);
        if (text !== null) {

      const nav = document.querySelector('.nav-links');
      if (nav && dict.nav && dict.nav.home) {

      if (!toggle || !menu || options.length === 0) {
        return;
      }

      const saved = localStorage.getItem('siteLanguage');
      const browser = (navigator.language || 'fr').slice(0, 2).toLowerCase();
      const initial = uiTranslations[saved] ? saved : uiTranslations[browser] ? browser : 'fr';
      applyUiLanguage(initial);

      toggle.addEventListener('click', () => {
        const isOpen = menu.classList.toggle('open');
        toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });

      options.forEach((option) => {
        option.addEventListener('click', () => {
          const selected = option.dataset.lang;
          applyUiLanguage(selected);
          menu.classList.remove('open');
          toggle.setAttribute('aria-expanded', 'false');
        });
      });

      document.addEventListener('click', (event) => {
        if (!menu.contains(event.target) && !toggle.contains(event.target)) {
          menu.classList.remove('open');
          toggle.setAttribute('aria-expanded', 'false');
        }
      });

        nav.classList.remove('open');

      };

      toggle.addEventListener('click', () => {
        const isOpen = nav.classList.toggle('open');
        toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });

      nav.querySelectorAll('a').forEach((link) => {
        link.addEventListener('click', closeNav);
      });

      document.addEventListener('click', (event) => {
        if (!nav.contains(event.target) && !toggle.contains(event.target)) {

    function extractHashtags(...texts) {
      const merged = texts.filter(Boolean).join(" ");
      const tags = merged.match(/#[^\s#]+/g) || [];
      const unique = [];
      const seen = new Set();

      for (const tag of tags) {
        const key = tag.toLowerCase();
        if (seen.has(key)) {
          continue;
        }
        seen.add(key);
        unique.push(tag);
      }

      return unique;
    }

    function normalizeVideo(v, platform) {
      const title = v.title || v.description || "Video";
      const description = v.description || "";
      const rawUrl = (v.url || "").trim();
      let resolvedUrl = rawUrl;

      if (!resolvedUrl && v.id) {
        if (platform === "tiktok") {
          resolvedUrl = `https://www.tiktok.com/@clip2ep.fan/video/${v.id}`;
        } else if (platform === "youtube") {
          resolvedUrl = `https://www.youtube.com/watch?v=${v.id}`;
        }
      }

      return {
        id: v.id || "",
        title,
        description,
        hashtags: extractHashtags(title, description),
        views: Number(v.views || 0),
        likes: Number(v.likes || 0),
        comments: Number(v.comments || 0),
        platform,
        url: resolvedUrl
      };
    }

    function sortByViews(items, platform) {
      return [...items]
        .map((v) => normalizeVideo(v, platform))
        .sort((a, b) => b.views - a.views);
    }

    function extractVideosFromRaw(raw) {
      const out = [];

      if (Array.isArray(raw?.videos)) {
        for (const item of raw.videos) {
          out.push({
            id: item.id,
            title: item.title || item.description || "",
            description: item.description || "",
            views: item.views || 0,
            likes: item.likes || 0,
            comments: item.comments || 0,
            url: item.url || "",
            platform: item.platform || "tiktok"
          });
        }
      }

      if (raw?.sources?.tiktok?.videos) {
        for (const item of raw.sources.tiktok.videos) {
          const flat = item.entry_flat || item;
          const full = item.full_info || {};
          out.push({
            id: flat.id,
            title: flat.title || flat.description || "",
            description: flat.description || full.description || "",
            views: flat.view_count || 0,
            likes: flat.like_count || 0,
            comments: flat.comment_count || 0,
            url: item.video_url || flat.url || "",
            platform: "tiktok"
          });
        }
      }

      if (raw?.sources?.youtube?.videos) {
        for (const item of raw.sources.youtube.videos) {
          const flat = item.entry_flat || item;
          const full = item.full_info || {};
          out.push({
            id: flat.id,
            title: flat.title || full.title || flat.description || "",
            description: flat.description || full.description || "",
            views: flat.view_count || flat.views || 0,
            likes: flat.like_count || flat.likes || 0,
            comments: flat.comment_count || flat.comments || 0,
            url: item.video_url || flat.url || "",
            platform: "youtube"
          });
        }
      }

      if (raw?.plateformes?.tiktok?.videos) {
        for (const item of raw.plateformes.tiktok.videos) {
          out.push({ ...item, platform: "tiktok" });
        }
      }

      if (raw?.plateformes?.youtube?.videos) {
        for (const item of raw.plateformes.youtube.videos) {
          out.push({ ...item, platform: "youtube" });
        }
      }

      return out;
    }

    function buildParkDataFromVideos(videos, parkKey) {
      const tiktok = videos
        .filter((v) => v.platform === "tiktok")
        .sort((a, b) => b.views - a.views);
      const youtube = videos
        .filter((v) => v.platform === "youtube")
        .sort((a, b) => b.views - a.views);
      const allVideos = [...tiktok, ...youtube];

      const computedTotals = allVideos.reduce(
        (acc, v) => {
          acc.views += v.views;
          acc.likes += v.likes;
          acc.comments += v.comments;
          return acc;
        },
        { views: 0, likes: 0, comments: 0 }
      );

      return {
        name: parkDisplayName[parkKey] || parkKey,
        totalVideos: allVideos.length,
        totalViews: computedTotals.views,
        totalLikes: computedTotals.likes,
        totalComments: computedTotals.comments,
        tiktok,
        youtube
      };
    }

    function hasParkHashtag(video, parkKey) {
      const expected = (parkHashtagsMap[parkKey] || []).map((t) => t.toLowerCase());
      const current = (video.hashtags || []).map((t) => t.toLowerCase());
      const byHashtag = expected.length > 0 && current.some((tag) => expected.includes(tag));

      const keywords = (parkKeywordsMap[parkKey] || []).map((k) => k.toLowerCase());
      const text = `${video.title || ""} ${video.description || ""}`.toLowerCase();
      const byKeyword = keywords.length > 0 && keywords.some((k) => text.includes(k));

      return byHashtag || byKeyword;
    }

    function dedupeVideos(videos) {
      const byKey = new Map();

      for (const v of videos) {
        const normalizedUrl = v.platform === "tiktok" ? normalizeTikTokUrl(v.url) : v.url;
        const key = normalizedUrl && normalizedUrl !== "#" ? normalizedUrl : `${v.platform}:${v.id || v.title}`;
        const existing = byKey.get(key);
        if (!existing || v.views > existing.views) {
          byKey.set(key, v);
        }
      }

      return [...byKey.values()];
    }

    function normalizeTikTokUrl(url) {
      return (url || "").split("?")[0];
    }

    function extractTikTokId(url) {
      const m = (url || "").match(/\/video\/(\d+)/);
      return m ? m[1] : "";
    }

    async function fetchStatsByFileName(fileName) {
      for (const base of statsBaseCandidates) {
        try {
          const response = await fetch(`${base}${fileName}`, { cache: "no-store" });
          if (!response.ok) {
            continue;
          }
          return await response.json();
        } catch (_) {
          // Try next candidate base path.
        }
      }

      return null;
    }

    async function loadAllStats() {
      for (const fileName of allStatsFiles) {
        const one = await fetchStatsByFileName(fileName);
        if (one) {
          return [one];
        }
      }

      return [];
    }

    async function loadParkData(parkKey) {
      const allStats = await loadAllStats();
      const allNormalizedVideos = allStats
        .flatMap((raw) => extractVideosFromRaw(raw))
        .map((v) => normalizeVideo(v, v.platform || "tiktok"));

      const collected = allNormalizedVideos.filter((v) => hasParkHashtag(v, parkKey));

      const uniqueVideos = dedupeVideos(collected);

      const forcedUrls = forcedVideoUrlsByPark[parkKey] || [];
      for (const forcedUrl of forcedUrls) {
        const forcedNorm = normalizeTikTokUrl(forcedUrl);
        const exists = uniqueVideos.some((v) => normalizeTikTokUrl(v.url) === forcedNorm);
        if (!exists) {
          const fromJson = allNormalizedVideos.find((v) => normalizeTikTokUrl(v.url) === forcedNorm);
          if (fromJson) {
            uniqueVideos.push(fromJson);
          } else {
            uniqueVideos.push({
              id: extractTikTokId(forcedUrl),
              title: "Video ajoutee manuellement",
              description: "",
              hashtags: parkKey === "disneyworld" ? ["#disneyworld"] : ["#etatsunis🇺🇸"],
              views: 0,
              likes: 0,
              comments: 0,
              platform: "tiktok",
              url: forcedUrl
            });
          }
        }
      }

      if (uniqueVideos.length > 0) {
        const usParks = new Set(["seaworld", "universal"]);
        const normalized = usParks.has(parkKey)
          ? uniqueVideos.map((v) => {
              const hasUsTag = (v.hashtags || []).some((tag) => tag.toLowerCase() === "#etatsunis🇺🇸");
              if (hasUsTag) {
                return v;
              }
              return { ...v, hashtags: [...(v.hashtags || []), "#etatsunis🇺🇸"] };
            })
          : uniqueVideos;

        return buildParkDataFromVideos(normalized, parkKey);
      }

      return fallbackData[parkKey] || null;
    }

    function fmt(n) {

      return new Intl.NumberFormat(locale).format(n);

    function formatHashtagsForDisplay(tags) {
      if (!Array.isArray(tags) || tags.length === 0) {
        return "";
      }

      const seen = new Set();
      const normalized = [];

      for (const rawTag of tags) {
        const text = String(rawTag || "").trim();
        if (!text) {
          continue;
        }
        const core = text.replace(/^#+/, "").replace(/\s+/g, "").trim();
        if (!core) {
          continue;
        }
        const key = core.toLowerCase();
        if (seen.has(key)) {
          continue;
        }
        seen.add(key);
        normalized.push(`#${core}`);
      }

      return normalized.join(" ");
    }

    function getPlaceholderThumbnail(platform) {
      const label = platform === "youtube" ? "YouTube" : "TikTok";

    }

    function extractYouTubeId(url) {
      const source = url || "";
      const watchMatch = source.match(/[?&]v=([\w-]{6,})/i);
      if (watchMatch) {
        return watchMatch[1];
      }
      const shortMatch = source.match(/youtu\.be\/([\w-]{6,})/i);
      if (shortMatch) {
        return shortMatch[1];
      }
      const embedMatch = source.match(/\/embed\/([\w-]{6,})/i);
      if (embedMatch) {
        return embedMatch[1];
      }
      return "";
    }

    function getYouTubeThumbnail(video) {
      const id = video.id || extractYouTubeId(video.url || "");
      return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : "";

    async function fetchTikTokThumbnail(videoUrl) {
      if (!videoUrl) {
        return "";
      }
      const cacheKey = `tiktok:${videoUrl}`;
      if (thumbnailCache.has(cacheKey)) {
        return thumbnailCache.get(cacheKey);
      }

      try {
        const endpoint = `https://www.tiktok.com/oembed?url=${encodeURIComponent(videoUrl)}`;
        const response = await fetch(endpoint, { mode: "cors" });
        if (!response.ok) {
          thumbnailCache.set(cacheKey, "");
          return "";
        }
        const data = await response.json();
        const thumb = typeof data?.thumbnail_url === "string" ? data.thumbnail_url : "";
        thumbnailCache.set(cacheKey, thumb);
        return thumb;
      } catch (_) {
        thumbnailCache.set(cacheKey, "");
        return "";
      }
    }

    async function hydrateTikTokThumbnails(root) {
      const nodes = Array.from((root || document).querySelectorAll('.video-thumb[data-platform="tiktok"]:not([data-thumb-loaded="1"])'));
      for (const node of nodes) {
        node.setAttribute("data-thumb-loaded", "1");
        const videoUrl = node.getAttribute("data-url") || "";
        const thumbnail = await fetchTikTokThumbnail(videoUrl);
        if (thumbnail) {
          node.src = thumbnail;
          node.classList.remove("is-placeholder");
        }
      }
    }

              data-url="${(v.url || "").replace(/"/g, "&quot;")}" />
            <div class="video-content">
              <div class="title">${v.title}</div>
              <div class="meta">${fmt(v.views)} ${t("videos.viewsUnit", "vues")} · ${fmt(v.likes)} ${t("videos.likesUnit", "likes")} · ${fmt(v.comments)} ${t("videos.commentsUnit", "commentaires")}</div>
              <div class="hashtags">${formatHashtagsForDisplay(v.hashtags) || t("videos.noHashtag", "Aucun hashtag détecté")}</div>
              ${/^https?:\/\//i.test(v.url || "")
                ? `<a class="link" href="${v.url}" target="_blank" rel="noopener noreferrer">${v.url}</a>`
                : `<span class="link">${t("videos.linkUnavailable", "Lien indisponible")}</span>`}
            </div>
          </div>
        </li>
      `;
    }

    function appendVideoBatch(listElement, items, state) {
      const batchSize = getListBatchSize();
      const chunk = items.slice(state.offset, state.offset + batchSize);
      if (chunk.length === 0) {
        return false;
      }

      listElement.insertAdjacentHTML("beforeend", chunk.map(renderVideoItem).join(""));
      state.offset += chunk.length;
      hydrateTikTokThumbnails(listElement);
      return state.offset < items.length;
    }

    function setupLazyList(key, items) {
      const listElement = document.querySelector(`[data-list-key="${key}"]`);
      const sentinel = document.querySelector(`[data-list-sentinel="${key}"]`);

      if (!listElement || !sentinel || !Array.isArray(items) || items.length === 0) {
        return;
      }

      const state = { offset: 0 };
      const hasMoreAfterFirstBatch = appendVideoBatch(listElement, items, state);
      if (!hasMoreAfterFirstBatch) {
        sentinel.remove();
        return;
      }

      const observer = new IntersectionObserver((entries) => {
        const isVisible = entries.some((entry) => entry.isIntersecting);
        if (!isVisible) {
          return;
        }

        const hasMore = appendVideoBatch(listElement, items, state);
        if (!hasMore) {
          observer.disconnect();
          lazyListControllers.delete(key);
          sentinel.remove();
        }
      }, { rootMargin: "300px 0px" });

      observer.observe(sentinel);
      lazyListControllers.set(key, observer);
    }

    function renderList(items, key) {
      if (!items || items.length === 0) {
        return `<div class="empty">${t("videos.noVideos", "Aucune vidéo enregistrée pour le moment.")}</div>`;
      }
      return `
        <ul data-list-key="${key}"></ul>
        <div class="list-sentinel" data-list-sentinel="${key}" aria-hidden="true"></div>
      `;
    }

    function computeViewData(data, mode) {
      const view = mode === "tiktok" || mode === "youtube" ? mode : "both";

      let selectedVideos = [];
      if (view === "tiktok") {
        selectedVideos = [...data.tiktok];
      } else if (view === "youtube") {
        selectedVideos = [...data.youtube];
      } else {
        selectedVideos = [...data.tiktok, ...data.youtube];
      }

      selectedVideos.sort((a, b) => b.views - a.views);

      const totals = selectedVideos.reduce(
        (acc, video) => {
          acc.views += Number(video.views || 0);
          acc.likes += Number(video.likes || 0);
          acc.comments += Number(video.comments || 0);
          return acc;
        },
        { views: 0, likes: 0, comments: 0 }
      );

      return {
        totalVideos: selectedVideos.length,
        totalViews: totals.views,
        totalLikes: totals.likes,
        totalComments: totals.comments,
        showTikTok: view !== "youtube",
        showYouTube: view !== "tiktok"
      };
    }

    function renderContent(data) {
      const content = document.getElementById("content");
      if (!content) {
        return;
      }

      const v = computeViewData(data, currentViewMode);

      content.innerHTML = `
        <h2 class="stats-title">${t("videos.totalsTitle", "Stats sur le parc")}</h2>
        <div class="stats">
          <div class="stat"><div class="stat-top"><svg class="stat-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6zm2 0v12h12V6H6zm3 2 7 4-7 4V8z"/></svg><strong>${fmt(v.totalVideos)}</strong></div><span>${t("videos.totalVideos", "vidéos")}</span></div>
          <div class="stat"><div class="stat-top"><svg class="stat-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M3 17l4-4 3 3 7-7 4 4v6H3v-2zm0-8h4v4H3V9zm6-4h4v8H9V5zm6 2h4v6h-4V7z"/></svg><strong>${fmt(v.totalViews)}</strong></div><span>${t("videos.totalViews", "vues")}</span></div>
          <div class="stat"><div class="stat-top"><svg class="stat-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M12.1 21.35l-1.1-1C5.14 15.24 2 12.39 2 8.99 2 6.24 4.24 4 6.99 4c1.7 0 3.33.79 4.41 2.05A5.76 5.76 0 0 1 15.81 4C18.56 4 20.8 6.24 20.8 8.99c0 3.4-3.14 6.25-8.9 11.36l-.8 1z"/></svg><strong>${fmt(v.totalLikes)}</strong></div><span>${t("videos.totalLikes", "likes")}</span></div>
          <div class="stat"><div class="stat-top"><svg class="stat-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M4 4h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H8l-4 4V6a2 2 0 0 1 2-2z"/></svg><strong>${fmt(v.totalComments)}</strong></div><span>${t("videos.totalComments", "commentaires")}</span></div>
        </div>
        ${renderViewFilter()}
        ${v.showTikTok ? `
        <section class="platform" id="tiktok-section">
          <h2><svg class="platform-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M16.6 5.82a4.83 4.83 0 0 0 2.82 1v3.05a7.8 7.8 0 0 1-2.8-.54v5.86a6.12 6.12 0 1 1-6.13-6.12c.23 0 .46.01.68.04v3.12a3.04 3.04 0 1 0 2.37 2.96V2.5h3.06c.02 1.14.46 2.2 1.2 3.32z"/></svg>${t("videos.viewTikTok", "TikTok")} (${data.tiktok.length})</h2>
          ${renderList(data.tiktok, "tiktok")}
        </section>` : ""}
        ${v.showYouTube ? `
        <section class="platform" id="youtube-section">
          <h2><svg class="platform-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M21.8 8.06a2.9 2.9 0 0 0-2.03-2.04C17.98 5.5 12 5.5 12 5.5s-5.98 0-7.77.52A2.9 2.9 0 0 0 2.2 8.06C1.7 9.86 1.7 12 1.7 12s0 2.14.5 3.94a2.9 2.9 0 0 0 2.03 2.04c1.79.52 7.77.52 7.77.52s5.98 0 7.77-.52a2.9 2.9 0 0 0 2.03-2.04c.5-1.8.5-3.94.5-3.94s0-2.14-.5-3.94zM10.1 15.3V8.7L15.8 12l-5.7 3.3z"/></svg>${t("videos.viewYouTube", "YouTube")} (${data.youtube.length})</h2>
          ${renderList(data.youtube, "youtube")}
        </section>` : ""}
      `;

      resetLazyLists();
      if (v.showTikTok) {
        setupLazyList("tiktok", data.tiktok);
      }
      if (v.showYouTube) {
        setupLazyList("youtube", data.youtube);
      }
      bindViewFilterEvents(content);
    }

    function renderViewFilter() {
      return `
        <div class="view-filter" aria-label="Filtrer la vue vidéos">
          <button class="view-chip ${currentViewMode === "both" ? "active" : ""}" type="button" data-view="both">
            <svg class="chip-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M16.6 5.82a4.83 4.83 0 0 0 2.82 1v3.05a7.8 7.8 0 0 1-2.8-.54v5.86a6.12 6.12 0 1 1-6.13-6.12c.23 0 .46.01.68.04v3.12a3.04 3.04 0 1 0 2.37 2.96V2.5h3.06c.02 1.14.46 2.2 1.2 3.32z"/></svg>
            <svg class="chip-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M21.8 8.06a2.9 2.9 0 0 0-2.03-2.04C17.98 5.5 12 5.5 12 5.5s-5.98 0-7.77.52A2.9 2.9 0 0 0 2.2 8.06C1.7 9.86 1.7 12 1.7 12s0 2.14.5 3.94a2.9 2.9 0 0 0 2.03 2.04c1.79.52 7.77.52 7.77.52s5.98 0 7.77-.52a2.9 2.9 0 0 0 2.03-2.04c.5-1.8.5-3.94.5-3.94s0-2.14-.5-3.94zM10.1 15.3V8.7L15.8 12l-5.7 3.3z"/></svg>
            <span>${t("videos.viewBoth", "TikTok + YouTube")}</span>
          </button>
          <button class="view-chip ${currentViewMode === "tiktok" ? "active" : ""}" type="button" data-view="tiktok">
            <svg class="chip-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M16.6 5.82a4.83 4.83 0 0 0 2.82 1v3.05a7.8 7.8 0 0 1-2.8-.54v5.86a6.12 6.12 0 1 1-6.13-6.12c.23 0 .46.01.68.04v3.12a3.04 3.04 0 1 0 2.37 2.96V2.5h3.06c.02 1.14.46 2.2 1.2 3.32z"/></svg>
            <span>${t("videos.viewTikTok", "TikTok")}</span>
          </button>
          <button class="view-chip ${currentViewMode === "youtube" ? "active" : ""}" type="button" data-view="youtube">
            <svg class="chip-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M21.8 8.06a2.9 2.9 0 0 0-2.03-2.04C17.98 5.5 12 5.5 12 5.5s-5.98 0-7.77.52A2.9 2.9 0 0 0 2.2 8.06C1.7 9.86 1.7 12 1.7 12s0 2.14.5 3.94a2.9 2.9 0 0 0 2.03 2.04c1.79.52 7.77.52 7.77.52s5.98 0 7.77-.52a2.9 2.9 0 0 0 2.03-2.04c.5-1.8.5-3.94.5-3.94s0-2.14-.5-3.94zM10.1 15.3V8.7L15.8 12l-5.7 3.3z"/></svg>
            <span>${t("videos.viewYouTube", "YouTube")}</span>
          </button>
        </div>
      `;
    }

    function bindViewFilterEvents(root) {
      const chips = Array.from((root || document).querySelectorAll(".view-chip"));
      chips.forEach((chip) => {
        chip.addEventListener("click", () => {
          const nextView = chip.dataset.view || "both";
          currentViewMode = nextView;
          if (currentParkData) {
            renderContent(currentParkData);
          }
        });
      });
    }

    async function renderPage() {
      const park = new URLSearchParams(window.location.search).get("park") || "";
      const content = document.getElementById("content");
      const title = document.getElementById("park-title");

      if (!park) {
        title.textContent = t("videos.parkTitle", "Parc");
        content.innerHTML = `<div class="empty">${t("videos.noParkSelected", "Aucun parc sélectionné.")}</div>`;
        updateParkOverview("", "");
        return;
      }

      content.innerHTML = `<div class="empty">${t("videos.loading", "Chargement des statistiques...")}</div>`;
      const d = await loadParkData(park);

      if (!d) {
        title.textContent = t("videos.parkTitle", "Parc");
        content.innerHTML = `<div class="empty">${t("videos.comingSoon", "Les détails vidéos pour ce parc arrivent bientôt.")}</div>`;
        updateParkOverview("", "");
        return;
      }

      title.textContent = d.name;
      updateParkOverview(park, d.name);
      currentParkData = d;
      renderContent(d);
    }

    renderPage();
  </script>
</body>
</html>
